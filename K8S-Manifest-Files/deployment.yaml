apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital
  template:
    metadata:
      labels:
        app: hospital
    spec:
      containers:
      - name: hospital-container
        image: anushanayak091/hospital-app:v1.0.0  
        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: hospital-config
        - secretRef:
            name: hospital-secret

        volumeMounts:
        - mountPath: "/app/data"
          name: storage

      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: hospital-pvc
